<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simulador ERP (Memória) — Fluxo Completo</title>
<style>
  :root{--bg:#0f1115;--card:#151923;--muted:#a8b3cf;--text:#e6e9f2;--accent:#4cc38a;--danger:#ef5f6b;--warn:#f0c36d;}
  *{box-sizing:border-box;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;}
  body{margin:0;background:var(--bg);color:var(--text);}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0b0e13;border-bottom:1px solid #222838;position:sticky;top:0;z-index:40}
  header h1{font-size:16px;margin:0;color:#cbd5f6}
  header .user{font-size:12px;color:var(--muted)}
  .layout{display:flex;min-height:calc(100vh - 52px);}
  aside{width:260px;border-right:1px solid #222838;background:#0b0e13;padding:12px;position:sticky;top:52px;height:calc(100vh - 52px);overflow:auto}
  aside h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#7b86a8;margin:16px 8px 8px}
  .menu button{width:100%;text-align:left;padding:10px 12px;margin:4px 0;border:1px solid #1f2638;background:#121725;color:#cdd6f7;border-radius:10px;cursor:pointer}
  .menu button:hover{border-color:#2f3a57;background:#151c2e}
  main{flex:1;padding:16px;min-width:0}
  .page h2{margin:0 0 12px;font-size:18px}
  .row{display:flex;flex-wrap:wrap;gap:10px}
  .col{flex:1 1 240px}
  .col-auto{flex:0 0 auto}
  .card{background:var(--card);border:1px solid #222838;border-radius:12px;overflow:hidden;margin-bottom:14px}
  .card-header{padding:10px 12px;border-bottom:1px solid #222838;background:#0f1420}
  .card-body{padding:12px}
  input,select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2a3249;background:#0e1320;color:#e2e7ff}
  input[type="number"]{text-align:right}
  .btn{padding:8px 12px;border-radius:8px;border:1px solid #2a3249;background:#0e1320;color:#e2e7ff;cursor:pointer}
  .btn:hover{border-color:#3a4566}
  .btn-primary{background:#1a2440;border-color:#32426e}
  .btn-success{background:#143227;border-color:#1f4d39;color:#c9f7e5}
  .btn-danger{background:#3a1217;border-color:#5c1c24;color:#ffd7dc}
  .btn-warn{background:#3a2e12;border-color:#5c4720;color:#ffe8ba}
  table{width:100%;border-collapse:collapse}
  th,td{padding:8px;border-bottom:1px solid #222838;font-size:13px}
  th{color:#9aa5c7;text-align:left;background:#0f1420;position:sticky;top:0}
  .text-end{text-align:right}
  .badge{padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid #2a3249;color:#cbd5f6}
  .badge.ok{border-color:#244b3a;color:#b7f8dd}
  .badge.err{border-color:#5c1c24;color:#ffb8c1}
  .muted{color:#8f9ab9}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal{width:min(640px,92vw);background:var(--card);border:1px solid #222838;border-radius:12px}
  .modal .card-header{display:flex;align-items:center;justify-content:space-between}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid #2a3249;font-size:11px;color:#b8c0e0}
  .hr{height:1px;background:#222838;margin:10px 0}
  .hint{font-size:12px;color:#97a2c4}
  .danger{color:#ff9aa7}
  footer{padding:8px 16px;border-top:1px solid #222838;color:#7f8ab0;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>Simulador ERP</h1>
  <div class="user" id="userInfo">Desconectado</div>
</header>

<div id="login" class="page" style="max-width:520px;margin:30px auto;">
  <div class="card">
    <div class="card-header"><h2>Login</h2></div>
    <div class="card-body">
      <div class="grid">
        <div><label>Usuário</label><input id="lg_user" value="admin"/></div>
        <div><label>Senha</label><input id="lg_pass" type="password" value="123456"/></div>
      </div>
      <div class="hr"></div>
      <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
      <span class="hint"></span>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="layout">
    <aside>
      <div class="menu" id="sidebar"></div>
    </aside>
    <main>
      <div class="page" id="page"></div>
    </main>
  </div>
</div>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <div class="card-header">
      <div id="modalTitle">Janela</div>
      <button class="btn" onclick="closeModal()">✕</button>
    </div>
    <div class="card-body" id="modalBody"></div>
  </div>
</div>

<script>
// ======= STATE (memória) =======
const state = {
  user: null,
  roles: ['ADMIN','VENDAS','COMPRAS','FINANCEIRO','ESTOQUE'],
  clientes: [],
  fornecedores: [],
  produtos: [],
  pv: [], // pedidos de venda
  pc: [], // pedidos de compra
  cr: [], // contas a receber
  cp: [], // contas a pagar
  caixa: { saldo: 0, movs: [] }, // {id, ts, tipo:'ENTRADA'|'SAIDA', origem:'CR'|'CP'|'MANUAL', ref, valor}
  audit: [] // {ts, evt, data}
};

// Seeds mínimos para simulação
seed();

// ======= Helpers =======
function $(id){ return document.getElementById(id); }
function genId(){ return Math.random().toString(36).slice(2,8); }
function money(n){ return (n||0).toFixed(2); }
function setPageTitle(t){ /* opcional */ }
function now(){ return new Date().toLocaleString(); }

function audit(evt, data){
  state.audit.push({ ts: Date.now(), evt, data });
}

function requireRole(...r){
  if(!state.user) return false;
  if(state.user.role === 'ADMIN') return true;
  return r.includes(state.user.role);
}

function showModal(html, title=''){
  $('modalTitle').textContent = title || 'Janela';
  $('modalBody').innerHTML = html;
  $('modalBack').style.display = 'flex';
}
function closeModal(){
  $('modalBack').style.display = 'none';
  $('modalTitle').textContent = 'Janela';
  $('modalBody').innerHTML = '';
}

// ======= Login =======
function doLogin(){
  const u = $('lg_user').value.trim();
  const p = $('lg_pass').value;
  if(!u || !p){ alert('Informe usuário e senha.'); return; }
  // Login único como ADMIN
  state.user = { name: u || 'admin', role: 'ADMIN' };
  $('userInfo').textContent = `${state.user.name} (${state.user.role})`;
  $('login').style.display = 'none';
  $('app').style.display = 'block';
  buildSidebar();
  if (typeof renderDashboard === 'function') renderDashboard();
}

// ======= Sidebar =======
function addButton(label, handler){
  const b = document.createElement('button');
  b.textContent = label;
  b.onclick = handler;
  $('sidebar').appendChild(b);
}
function group(title){
  const h = document.createElement('h3');
  h.textContent = title;
  $('sidebar').appendChild(h);
}
function buildSidebar(){
  const sb = $('sidebar'); sb.innerHTML = '';
  addButton('Dashboard', renderDashboard);

  group('Cadastros');
  addButton('Clientes', renderClientes);
  addButton('Fornecedores', renderFornecedores);
  addButton('Produtos', renderProdutos);

  group('Compras');
  addButton('Pedidos de Compra (PC)', renderPC);

  group('Vendas');
  addButton('Pedidos de Venda (PV)', renderPV);

  group('Financeiro');
  addButton('Contas a Receber (CR)', renderCR);
  addButton('Contas a Pagar (CP)', renderCP);
  addButton('Caixa', renderCaixa);

  group('Auditoria');
  addButton('Eventos', renderAudit);

  addButton('Sair', ()=>location.reload());
}

// ======= Dashboard =======
function renderDashboard(){
  const el = $('page');
  const totalEstoque = state.produtos.reduce((s,p)=>s + (p.estoque||0), 0);
  const crAbertos = state.cr.filter(x=>!x.liquidado).length;
  const cpAbertos = state.cp.filter(x=>!x.liquidado).length;
  el.innerHTML = `
  <div class="page">
    <h2>Visão Geral</h2>
    <div class="grid">
      <div class="card"><div class="card-body">
        <div class="muted">Saldo de Caixa</div>
        <div style="font-size:24px">R$ ${money(state.caixa.saldo)}</div>
      </div></div>
      <div class="card"><div class="card-body">
        <div class="muted">Itens em Estoque</div>
        <div style="font-size:24px">${totalEstoque}</div>
      </div></div>
      <div class="card"><div class="card-body">
        <div class="muted">CR em Aberto</div>
        <div style="font-size:24px">${crAbertos}</div>
      </div></div>
      <div class="card"><div class="card-body">
        <div class="muted">CP em Aberto</div>
        <div style="font-size:24px">${cpAbertos}</div>
      </div></div>
    </div>
    <div class="card"><div class="card-header"><strong>Atalhos</strong></div><div class="card-body toolbar">
      <button class="btn btn-primary" onclick="renderPV()">Novo PV</button>
      <button class="btn btn-primary" onclick="renderPC()">Novo PC</button>
      <button class="btn btn-success" onclick="renderCaixa()">Abrir Caixa</button>
      <button class="btn" onclick="renderProdutos()">Produtos</button>
    </div></div>
  </div>`;
}

// ======= Cadastros =======
function renderClientes(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Clientes</h2>
    <div class="card"><div class="card-body grid">
      <div><label>Nome</label><input id="cl_nome"></div>
      <div><label>Documento</label><input id="cl_doc"></div>
      <div class="col-auto"><label>&nbsp;</label><button class="btn btn-primary" onclick="addCliente()">Adicionar</button></div>
    </div></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Nome</th><th>Documento</th></tr></thead>
      <tbody>${state.clientes.map((c,i)=>`<tr><td>${i+1}</td><td>${c.nome}</td><td>${c.doc||''}</td></tr>`).join('')}</tbody></table>
    </div></div>
  </div>`;
}
function addCliente(){
  const nome = $('cl_nome').value.trim();
  if(!nome) return alert('Informe o nome.');
  state.clientes.push({ id: genId(), nome, doc: $('cl_doc').value.trim() });
  audit('CAD_CLIENTE',{nome});
  renderClientes();
}

function renderFornecedores(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Fornecedores</h2>
    <div class="card"><div class="card-body grid">
      <div><label>Nome</label><input id="fo_nome"></div>
      <div><label>Documento</label><input id="fo_doc"></div>
      <div class="col-auto"><label>&nbsp;</label><button class="btn btn-primary" onclick="addFornecedor()">Adicionar</button></div>
    </div></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Nome</th><th>Documento</th></tr></thead>
      <tbody>${state.fornecedores.map((c,i)=>`<tr><td>${i+1}</td><td>${c.nome}</td><td>${c.doc||''}</td></tr>`).join('')}</tbody></table>
    </div></div>
  </div>`;
}
function addFornecedor(){
  const nome = $('fo_nome').value.trim();
  if(!nome) return alert('Informe o nome.');
  state.fornecedores.push({ id: genId(), nome, doc: $('fo_doc').value.trim() });
  audit('CAD_FORNECEDOR',{nome});
  renderFornecedores();
}

function renderProdutos(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Produtos</h2>
    <div class="card"><div class="card-body grid">
      <div><label>Nome</label><input id="pr_nome"></div>
      <div><label>Preço (R$)</label><input id="pr_preco" type="number" step="0.01" value="0"></div>
      <div><label>Estoque Inicial</label><input id="pr_estoque" type="number" step="1" value="0"></div>
      <div class="col-auto"><label>&nbsp;</label><button class="btn btn-primary" onclick="addProduto()">Adicionar</button></div>
    </div></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Nome</th><th class="text-end">Preço</th><th class="text-end">Estoque</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.produtos.map((p,i)=>`
          <tr>
            <td>${i+1}</td><td>${p.nome}</td><td class="text-end">R$ ${money(p.preco)}</td>
            <td class="text-end">${p.estoque||0}</td>
            <td><button class="btn btn-warn btn-sm" onclick="abrirAjusteEstoque('${p.id}')">Ajustar Estoque</button></td>
          </tr>`).join('')}
      </tbody></table>
    </div></div>
  </div>`;
}
function addProduto(){
  const nome = $('pr_nome').value.trim();
  const preco = parseFloat($('pr_preco').value||'0');
  const estoque = parseInt($('pr_estoque').value||'0',10);
  if(!nome) return alert('Informe o nome.');
  if(preco<0 || estoque<0) return alert('Valores inválidos.');
  state.produtos.push({ id: genId(), nome, preco, estoque });
  audit('CAD_PRODUTO',{nome,preco,estoque});
  renderProdutos();
}
function findProduto(id){ return state.produtos.find(p=>p.id===id); }

// Ajuste de estoque
function abrirAjusteEstoque(prodId){
  const p = findProduto(prodId); if(!p) return;
  showModal(`
    <div class="grid">
      <div class="col"><div class="muted">Produto</div><div style="font-size:16px">${p.nome}</div></div>
      <div class="col"><div class="muted">Estoque atual</div><div style="font-size:16px">${p.estoque||0}</div></div>
    </div>
    <div class="hr"></div>
    <div class="grid">
      <div><label>Quantidade (+ entrada, − saída)</label><input id="aj_qt" type="number" step="1" value="0"></div>
      <div><label>Motivo</label><input id="aj_motivo" placeholder="Inventário, perda, correção..." /></div>
    </div>
    <div class="hr"></div>
    <div style="text-align:right">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarAjusteEstoque('${p.id}')">Aplicar</button>
    </div>
  `, 'Ajustar Estoque');
}
function confirmarAjusteEstoque(prodId){
  const p = findProduto(prodId); if(!p) return;
  const delta = parseInt($('aj_qt').value||'0',10);
  const motivo = ($('aj_motivo').value||'AJUSTE').trim();
  if(delta===0) return alert('Informe quantidade diferente de zero.');
  if((p.estoque||0)+delta<0) return alert('Operação deixaria estoque negativo.');
  const antes = p.estoque||0;
  p.estoque = antes + delta;
  audit('AJUSTE_ESTOQUE',{prodId:p.id,nome:p.nome,antes,delta,depois:p.estoque,motivo});
  closeModal();
  renderProdutos();
}

// ======= Compras (PC) =======
function renderPC(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Pedidos de Compra (PC)</h2>
    <div class="card"><div class="card-body grid">
      <div>
        <label>Fornecedor</label>
        <select id="pc_forn">${state.fornecedores.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}</select>
      </div>
      <div><label>Produto</label><select id="pc_prod">${state.produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div>
      <div><label>Qtd</label><input id="pc_qtd" type="number" step="1" value="1"></div>
      <div><label>Preço Unit (R$)</label><input id="pc_preco" type="number" step="0.01" value="0"></div>
      <div class="col-auto"><label>&nbsp;</label><button class="btn btn-primary" onclick="addPC()">Adicionar PC</button></div>
    </div></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Fornecedor</th><th>Itens</th><th class="text-end">Total</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.pc.map((o,i)=>`
          <tr>
            <td>${i+1}</td>
            <td>${(state.fornecedores.find(f=>f.id===o.fornId)||{}).nome||'-'}</td>
            <td>${o.itens.map(it=>`${(findProduto(it.prodId)||{}).nome||'?'} x ${it.qtd} @ R$ ${money(it.preco)}`).join('<br/>')}</td>
            <td class="text-end">R$ ${money(o.total)}</td>
            <td><span class="badge ${o.status==='RECEBIDO'?'ok':''}">${o.status}</span></td>
            <td>
              ${o.status==='RASCUNHO'?`<button class="btn btn-warn btn-sm" onclick="aprovarPC('${o.id}')">Aprovar</button>`:''}
              ${o.status==='APROVADO'?`<button class="btn btn-success btn-sm" onclick="receberPC('${o.id}')">Receber</button>`:''}
            </td>
          </tr>`).join('')}
      </tbody></table>
    </div></div>
  </div>`;
}
function addPC(){
  if(state.fornecedores.length===0 || state.produtos.length===0) return alert('Cadastre fornecedor e produto.');
  const fornId = $('pc_forn').value;
  const prodId = $('pc_prod').value;
  const qtd = parseInt($('pc_qtd').value||'0',10);
  const preco = parseFloat($('pc_preco').value||'0');
  if(qtd<=0 || preco<0) return alert('Quantidade/Preço inválidos.');
  const id = genId();
  const total = qtd*preco;
  state.pc.push({ id, fornId, itens:[{prodId, qtd, preco}], total, status:'RASCUNHO' });
  audit('PC_ADD',{id,fornId,prodId,qtd,preco,total});
  renderPC();
}
function findPC(id){ return state.pc.find(x=>x.id===id); }
function aprovarPC(id){
  const o = findPC(id); if(!o) return;
  o.status='APROVADO';
  audit('PC_APROVAR',{id});
  renderPC();
}
function receberPC(id){
  const o = findPC(id); if(!o) return;
  if(o.status!=='APROVADO') return alert('PC precisa estar APROVADO.');
  // Entrada de estoque
  o.itens.forEach(it=>{ const p=findProduto(it.prodId); if(p){ p.estoque=(p.estoque||0)+parseInt(it.qtd,10); } });
  // Gera CP
  const titulo = { id: genId(), numero: 'CP-'+id.toUpperCase(), origem:'PC', ref:id, valor:o.total, liquidado:false, ts:Date.now() };
  state.cp.push(titulo);
  o.status='RECEBIDO';
  audit('PC_RECEBER',{id,total:o.total});
  renderPC();
}

// ======= Vendas (PV) =======
function renderPV(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Pedidos de Venda (PV)</h2>
    <div class="card"><div class="card-body grid">
      <div>
        <label>Cliente</label>
        <select id="pv_cli">${state.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select>
      </div>
      <div><label>Produto</label><select id="pv_prod">${state.produtos.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div>
      <div><label>Qtd</label><input id="pv_qtd" type="number" step="1" value="1"></div>
      <div><label>Preço Unit (R$)</label><input id="pv_preco" type="number" step="0.01" value="0"></div>
      <div class="col-auto"><label>&nbsp;</label><button class="btn btn-primary" onclick="addPV()">Adicionar PV</button></div>
    </div></div>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Cliente</th><th>Itens</th><th class="text-end">Total</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.pv.map((o,i)=>`
          <tr>
            <td>${i+1}</td>
            <td>${(state.clientes.find(c=>c.id===o.cliId)||{}).nome||'-'}</td>
            <td>${o.itens.map(it=>`${(findProduto(it.prodId)||{}).nome||'?'} x ${it.qtd} @ R$ ${money(it.preco)}`).join('<br/>')}</td>
            <td class="text-end">R$ ${money(o.total)}</td>
            <td><span class="badge ${o.status==='FATURADO'?'ok':''}">${o.status}</span></td>
            <td>
              ${o.status==='RASCUNHO'?`<button class="btn btn-warn btn-sm" onclick="aprovarPV('${o.id}')">Aprovar</button>`:''}
              ${o.status==='APROVADO'?`<button class="btn btn-success btn-sm" onclick="faturarPV('${o.id}')">Faturar</button>`:''}
            </td>
          </tr>`).join('')}
      </tbody></table>
    </div></div>
  </div>`;
}
function addPV(){
  if(state.clientes.length===0 || state.produtos.length===0) return alert('Cadastre cliente e produto.');
  const cliId = $('pv_cli').value;
  const prodId = $('pv_prod').value;
  const qtd = parseInt($('pv_qtd').value||'0',10);
  const preco = parseFloat($('pv_preco').value||'0');
  if(qtd<=0 || preco<0) return alert('Quantidade/Preço inválidos.');
  const id = genId();
  const total = qtd*preco;
  state.pv.push({ id, cliId, itens:[{prodId,qtd,preco}], total, status:'RASCUNHO' });
  audit('PV_ADD',{id,cliId,prodId,qtd,preco,total});
  renderPV();
}
function findPV(id){ return state.pv.find(x=>x.id===id); }
function aprovarPV(id){
  const o = findPV(id); if(!o) return;
  o.status='APROVADO';
  audit('PV_APROVAR',{id});
  renderPV();
}
function faturarPV(id){
  const o = findPV(id); if(!o) return;
  if(o.status!=='APROVADO') return alert('PV precisa estar APROVADO.');
  // Valida estoque
  const faltas = [];
  o.itens.forEach(it=>{
    const p = findProduto(it.prodId);
    const q = parseInt(it.qtd,10);
    if(!p || p.estoque < q){
      faltas.push({prod: (p&&p.nome)||'?', precisa:q, tem:(p&&p.estoque)||0});
    }
  });
  if(faltas.length){
    alert('Faturamento bloqueado por falta de estoque:\n\n' + faltas.map(f=>`• ${f.prod}: precisa ${f.precisa}, tem ${f.tem}`).join('\n'));
    return;
  }
  // Baixa estoque
  o.itens.forEach(it=>{ const p=findProduto(it.prodId); p.estoque -= parseInt(it.qtd,10); });
  // Gera CR
  const titulo = { id: genId(), numero: 'CR-'+id.toUpperCase(), origem:'PV', ref:id, valor:o.total, liquidado:false, ts:Date.now() };
  state.cr.push(titulo);
  o.status='FATURADO';
  audit('PV_FATURAR',{id,total:o.total});
  renderPV();
}

// ======= Financeiro: CR/CP & Caixa =======
function renderCR(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Contas a Receber (CR)</h2>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Número</th><th>Origem</th><th>Ref</th><th class="text-end">Valor</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.cr.map((t,i)=>`
          <tr>
            <td>${i+1}</td><td>${t.numero}</td><td>${t.origem}</td><td>${t.ref}</td>
            <td class="text-end">R$ ${money(t.valor)}</td>
            <td>${t.liquidado?'<span class="badge ok">LIQ.</span>':'<span class="badge">ABERTO</span>'}</td>
            <td>${!t.liquidado?`<button class="btn btn-success btn-sm" onclick="liq('cr','${t.id}')">Liquidar</button>`:''}</td>
          </tr>`).join('')}
      </tbody></table>
    </div></div>
  </div>`;
}
function renderCP(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Contas a Pagar (CP)</h2>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>#</th><th>Número</th><th>Origem</th><th>Ref</th><th class="text-end">Valor</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        ${state.cp.map((t,i)=>`
          <tr>
            <td>${i+1}</td><td>${t.numero}</td><td>${t.origem}</td><td>${t.ref}</td>
            <td class="text-end">R$ ${money(t.valor)}</td>
            <td>${t.liquidado?'<span class="badge ok">LIQ.</span>':'<span class="badge">ABERTO</span>'}</td>
            <td>${!t.liquidado?`<button class="btn btn-danger btn-sm" onclick="liq('cp','${t.id}')">Pagar</button>`:''}</td>
          </tr>`).join('')}
      </tbody></table>
    </div></div>
  </div>`;
}
function findTitulo(tipo,id){
  if(tipo==='cr') return state.cr.find(x=>x.id===id);
  if(tipo==='cp') return state.cp.find(x=>x.id===id);
  return null;
}
function liq(tipo,id){
  const t = findTitulo(tipo,id); if(!t) return;
  if(t.liquidado) return;
  const valor = parseFloat(t.valor||0);
  const ref = `${t.numero}`;
  if(tipo==='cr'){
    state.caixa.saldo += valor;
    state.caixa.movs.push({ id: genId(), ts: Date.now(), tipo:'ENTRADA', origem:'CR', ref, valor });
    t.liquidado = true;
    audit('CR_LIQ',{id:t.id,valor});
    renderCR();
  }else{
    // cp
    if(state.caixa.saldo < valor){ alert('Saldo insuficiente no Caixa.'); return; }
    state.caixa.saldo -= valor;
    state.caixa.movs.push({ id: genId(), ts: Date.now(), tipo:'SAIDA', origem:'CP', ref, valor });
    t.liquidado = true;
    audit('CP_LIQ',{id:t.id,valor});
    renderCP();
  }
}

function renderCaixa(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Caixa (Memória)</h2>
    <div class="card">
      <div class="card-header"><strong>Saldo atual: R$ ${money(state.caixa.saldo)}</strong></div>
      <div class="card-body">
        <div class="row">
          <div class="col"><input id="cx_valor" type="number" step="0.01" min="0" placeholder="Valor"></div>
          <div class="col"><input id="cx_ref" placeholder="Referência (opcional)"></div>
          <div class="col-auto"><button class="btn btn-success" onclick="caixaAportar()">Aportar</button></div>
          <div class="col-auto"><button class="btn btn-danger" onclick="caixaRetirar()">Retirar</button></div>
        </div>
        <div class="hr"></div>
        <table>
          <thead><tr><th>#</th><th>Quando</th><th>Tipo</th><th>Origem</th><th>Ref</th><th class="text-end">Valor</th></tr></thead>
          <tbody id="tb_caixa">${state.caixa.movs.slice().sort((a,b)=>b.ts-a.ts).map(m=>`
            <tr><td>${m.id}</td><td>${new Date(m.ts).toLocaleString()}</td><td>${m.tipo}</td><td>${m.origem}</td><td>${m.ref||''}</td><td class="text-end">R$ ${money(m.valor)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}
function caixaAportar(){
  const v = parseFloat(($('cx_valor').value||'0')); const ref = ($('cx_ref').value||'MANUAL').trim();
  if(v<=0) return alert('Informe valor > 0');
  state.caixa.saldo += v;
  state.caixa.movs.push({ id: genId(), ts: Date.now(), tipo:'ENTRADA', origem:'MANUAL', ref, valor:v });
  audit('CAIXA_ENTRADA',{v,ref});
  renderCaixa();
}
function caixaRetirar(){
  const v = parseFloat(($('cx_valor').value||'0')); const ref = ($('cx_ref').value||'MANUAL').trim();
  if(v<=0) return alert('Informe valor > 0');
  if(state.caixa.saldo < v) return alert('Saldo insuficiente.');
  state.caixa.saldo -= v;
  state.caixa.movs.push({ id: genId(), ts: Date.now(), tipo:'SAIDA', origem:'MANUAL', ref, valor:v });
  audit('CAIXA_SAIDA',{v,ref});
  renderCaixa();
}

// ======= Auditoria =======
function renderAudit(){
  const el = $('page');
  el.innerHTML = `
  <div class="page">
    <h2>Auditoria</h2>
    <div class="card"><div class="card-body">
      <table><thead><tr><th>Quando</th><th>Evento</th><th>Dados</th></tr></thead>
      <tbody>${state.audit.slice().reverse().map(a=>`
        <tr><td>${new Date(a.ts).toLocaleString()}</td><td>${a.evt}</td><td><span class="muted">${escapeHtml(JSON.stringify(a.data))}</span></td></tr>`).join('')}</tbody>
      </table>
    </div></div>
  </div>`;
}

function escapeHtml(str){ return str.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
